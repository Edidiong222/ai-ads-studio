{% extends "web/base_app.html" %}
{% block title %}AI Ads Studio{% endblock %}
{% block main %}
<section class="notification max-w-6xl mx-auto px-4 md:px-8 py-5">
            <div class="inbox">
              <div
                class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5"
              >
                <div>
                  <div class="inbox-note flex items-center gap-3">
                    <h3 class="text-[26px] font-bold text-gray-900">Inbox</h3>

                    <div
                      id="notifications-new-badge"
                      class="bg-blue-600 text-white text-sm px-3 py-1 rounded-full font-medium hidden"
                    >
                      0 new
                    </div>
                  </div>

                  <p class="text-gray-500 text-sm md:text-base mt-2">
                    Stay on top of campaign updates, performance alerts and team
                    activity.
                  </p>
                </div>

                <div class="inbox-p-btn flex flex-wrap gap-3">
                  <button
                    class="bg-white border border-gray-200 text-gray-700 rounded-xl px-4 py-2 text-sm font-medium shadow-sm"
                  >
                    <i class="fa-solid fa-gear mr-2"></i>Preferences
                  </button>

                  <button
                    class="bg-blue-600 text-white rounded-xl px-4 py-2 text-sm font-medium shadow-sm"
                  >
                    <i class="fa-solid fa-check-double mr-2"></i>Mark all read
                  </button>
                </div>
              </div>

              <div
                class="inbox-btn bg-[#f1f5f9] rounded-2xl p-2 mt-6 overflow-x-auto"
              >
                <div class="flex gap-2 min-w-max">
                  <button
                    class="bg-white text-gray-900 text-sm font-semibold rounded-xl px-4 py-2 shadow-sm"
                  >
                    All
                  </button>

                  <button
                    class="text-gray-600 text-sm font-medium rounded-xl px-4 py-2 hover:bg-white"
                  >
                    Unread
                    <span
                      id="notifications-unread-tab"
                      class="bg-blue-600 text-white text-xs rounded-full px-2 py-0.5 ml-1 hidden"
                      >0</span
                    >
                  </button>

                  <button
                    class="text-gray-600 text-sm font-medium rounded-xl px-4 py-2 hover:bg-white"
                  >
                    Campaigns
                  </button>

                  <button
                    class="text-gray-600 text-sm font-medium rounded-xl px-4 py-2 hover:bg-white"
                  >
                    Performance
                  </button>

                  <button
                    class="text-gray-600 text-sm font-medium rounded-xl px-4 py-2 hover:bg-white"
                  >
                    Billing
                  </button>

                  <button
                    class="text-gray-600 text-sm font-medium rounded-xl px-4 py-2 hover:bg-white"
                  >
                    Team
                  </button>

                  <button
                    class="text-gray-600 text-sm font-medium rounded-xl px-4 py-2 hover:bg-white"
                  >
                    System
                  </button>
                </div>
              </div>
            </div>

            <div
              class="notebar border border-gray-200 rounded-3xl shadow-sm bg-white mt-6 overflow-hidden"
            >
              <div id="notifications-list">
                <p class="text-gray-500 text-center py-12 text-sm">Loading notifications...</p>
              </div>
            </div>
          </section>
{% endblock %}
